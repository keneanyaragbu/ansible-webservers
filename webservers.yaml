---
- name: Configure Web Servers
  hosts: webservers
  become: yes  # Run as sudo

  tasks:
    - name: Install Nginx
      yum:
        name: nginx
        state: present

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Deploy custom homepage
      copy:
        content: "<h1>Hello from {{ inventory_hostname }} — Deployed by Ansible!</h1>"
        dest: /usr/share/nginx/html/index.html
